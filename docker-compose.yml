services:
  api:
    build: .
    env_file: .env
    ports:
      - "${HOST_HTTPS_PORT:-443}:${CONTAINER_PORT:-5000}"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import ssl,urllib.request; ctx=ssl._create_unverified_context(); urllib.request.urlopen('https://localhost:5000/login.html', context=ctx, timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 12